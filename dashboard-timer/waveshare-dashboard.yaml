image:
  - file: 'images/blue_dots.jpg'
    id: wallpaper
    type: RGB565
    transparency: opaque   
  - file: 'images/home_assistant_logo.png'
    id: boot_logo
    resize: 200x200
    type: RGB565
    transparency: alpha_channel     

################################################################################
# LVGL
################################################################################
lvgl:
  displays: my_display
  touchscreens: my_touch
  log_level: INFO
  disp_bg_image: wallpaper
  top_layer:
    widgets:
      - obj:
          id: boot_screen
          x: 0
          y: 0
          width: 100%
          height: 100%
          bg_color: 0xffffff
          bg_opa: COVER
          radius: 0
          pad_all: 0
          border_width: 0
          widgets:
            - image:
                align: CENTER
                src: boot_logo
                y: -40
            - spinner:
                align: CENTER
                y: 95
                height: 50
                width: 50
                spin_time: 1s
                arc_length: 60deg
                arc_width: 8
                indicator:
                  arc_color: 0x18bcf2

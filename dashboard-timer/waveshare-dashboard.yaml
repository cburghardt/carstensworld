substitutions:
  name: waveshare-dashboard
  friendly_name: Waveshare 7

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.arduino.memory_type: qio_opi
    board_build.flash_mode: dio
    board_upload.maximum_ram_size: 524288
    board_upload.maximum_size: 8388608  
  on_boot:
    - deep_sleep.prevent: deep_sleep_1 
    - delay: 7s
    - lvgl.widget.hide: boot_screen

esp32:
  board: esp32-s3-devkitc-1
  cpu_frequency: 240MHz
  flash_size: 16MB
  framework:
    type: esp-idf  
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_LV_ATTRIBUTE_FAST_MEM_USE_IRAM: "y"
    advanced:
      enable_idf_experimental_features: true
      execute_from_psram: true      

psram:
  mode: octal
  speed: 80MHz

# Enable logging
logger:

# Allow Over-The-Air updates
ota:
- platform: esphome

api:
  encryption:
    key: # add

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

deep_sleep:
  id: deep_sleep_1
  run_duration: 60s  
  sleep_duration: 15min    

esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true  

################################################################################
# I2C for touchscreen
################################################################################
i2c:
  sda: GPIO08
  scl: GPIO09
  scan: true
  id: bus_a

################################################################################
# IO Extender
################################################################################
ch422g:
  - id: ch422g_hub  

globals:
  - id: timer_original_secs
    type: int
    restore_value: no
    initial_value: "0"

switch:
  - platform: gpio
    name: "Backlight Toggle"
    id: device_backlight
    pin: 
      ch422g: ch422g_hub
      number: 2
      mode:
        output: true
      inverted: False
    restore_mode: ALWAYS_ON
    on_turn_on: 
      - lvgl.resume
      - script.execute: time_update
    on_turn_off: 
      - lvgl.pause      

  - platform: restart
    name: "Restart"
    id: device_restart

  - platform: template
    name: Antiburn
    id: switch_antiburn
    icon: mdi:television-shimmer
    optimistic: true
    entity_category: "config"
    turn_on_action:
      - logger.log: "Starting Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - lvgl.pause:
          show_snow: true
    turn_off_action:
      - logger.log: "Stopping Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:    

display:
  - platform: rpi_dpi_rgb
    id: my_display
    update_interval: never
    auto_clear_enabled: false
    color_order: RGB
    pclk_frequency: 21MHZ
    dimensions:
      width: 800
      height: 480
    de_pin:
      number: 5
    hsync_pin:
      number: 46
      ignore_strapping_warning: true
    vsync_pin:
      number: 3
      ignore_strapping_warning: true
    pclk_pin: 7
    pclk_inverted: true
    reset_pin:
      ch422g: ch422g_hub
      number: 3
    hsync_back_porch: 8
    hsync_front_porch: 8
    hsync_pulse_width: 4
    vsync_back_porch: 16
    vsync_front_porch: 16
    vsync_pulse_width: 4
    data_pins:
      red:
        - 1         #r3
        - 2         #r4
        - 42        #r5
        - 41        #r6
        - 40        #r7
      blue:
        - 14        #b3
        - 38        #b4
        - 18        #b5
        - 17        #b6
        - 10        #b7
      green:
        - 39        #g2
        - 0         #g3
        - 45        #g4
        - 48        #g5
        - 47        #g6
        - 21        #g7

touchscreen:
  platform: gt911
  id: my_touch
  interrupt_pin: GPIO4
  reset_pin:
    ch422g: ch422g_hub
    number: 1
    mode: OUTPUT
  transform:
    swap_xy: true
    mirror_x: false
    mirror_y: true
  on_touch:
    - lambda: |-
        ESP_LOGI("Touch", "Touch detected at x=%d, y=%d", touch.x, touch.y);
  on_update:
    - lambda: |-
          for (auto touch: touches)  {
            if (touch.state <= 2) {
              ESP_LOGI("Touch points:", "id=%d x=%d, y=%d x.raw=%d, y.raw=%d", touch.id, touch.x, touch.y, touch.x_raw, touch.y_raw);
            }
          }  
  on_release:
    then:
      - if:
          condition: lvgl.is_paused
          then:
            - switch.turn_on: device_backlight

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Berlin
    on_time_sync:
      - script.execute: time_update
      - script.execute: sun_update
    on_time:
      - minutes: '*'
        seconds: '*'
        then:
          - if:
              condition: 
                - not: lvgl.is_paused                
                - switch.is_off: switch_antiburn
              then:      
                - script.execute: sec_update                
      - minutes: '*'
        seconds: 0
        then:
          - if:
              condition: 
                - not: lvgl.is_paused
                - switch.is_off: switch_antiburn
              then:                
                - script.execute: time_update
      - hours: 1,2,3,4,5
        minutes: 0
        seconds: 0
        then:
          - switch.turn_on: switch_antiburn
      - hours: 1,2,3,4,5
        minutes: 15
        seconds: 0
        then:
          - switch.turn_off: switch_antiburn  
      - hours: 1,2,3,4
        minutes: 20,40
        seconds: 0
        then:
          - logger.log: "Sleeping.."
          - deep_sleep.enter: deep_sleep_1

script:
  - id: time_update
    then:
      - lvgl.label.update:
          id: lbl_clock_time
          text:
            time_format: "%H:%M"
            time: !lambda return id(sntp_time).now();
  - id: sec_update
    then:
      - lvgl.label.update:
          id: lbl_clock_sec
          text:
            time_format: "%S"
            time: !lambda return id(sntp_time).now();           
  - id: sun_update
    then:
      - if:
          condition:
            - sun.is_above_horizon:
          then:
            - logger.log: "Above horizon"
            - lvgl.widget.hide: lbl_sun_icon_up
            - lvgl.widget.show: lbl_sun_icon_down
            - lvgl.label.update:
                id: lbl_sun
                text:
                  format: "%s"
                  args: [ 'id(sun_next_sunset).state.c_str()' ] 
          else:  
            - logger.log: "Below horizon"
            - lvgl.widget.show: lbl_sun_icon_up
            - lvgl.widget.hide: lbl_sun_icon_down            
            - lvgl.label.update:
                id: lbl_sun
                text:
                  format: "%s"
                  args: [ 'id(sun_next_sunrise).state.c_str()' ]                                

sensor:    
  - platform: homeassistant
    entity_id: sensor.wohnzimmer_temperatur
    id: temperature_kitchen             
    on_value:
      - lvgl.label.update:
          id: lbl_temperature_kitchen
          text: !lambda  |-
              char buf[24];
              int n = snprintf(buf, sizeof(buf), "%.1f°C", x);
              for (int i = 0; i < n; i++) if (buf[i] == '.') buf[i] = ',';
              return std::string(buf);
  - platform: homeassistant
    entity_id: sensor.outdoor_temperature_2
    id: temperature_outdoor             
    on_value:
      - lvgl.label.update:
          id: lbl_temperature_outdoor
          text: !lambda  |-
              char buf[24];
              int n = snprintf(buf, sizeof(buf), "%.1f°C", x);
              for (int i = 0; i < n; i++) if (buf[i] == '.') buf[i] = ',';
              return std::string(buf);
  - platform: homeassistant
    entity_id: sensor.home_assistant_voice_091575_next_timer
    id: timer                      
    on_value:
      then:
        - if:
            condition:   
              - not: lvgl.is_paused           
              - lambda:  |-
                  if (((int) id(timer_original_secs)) == 0 && id(timer).state > 0) {
                    id(timer_original_secs) = (int) id(timer).state;
                  }
                  return (id(timer).state > 0);
            then:    
              - lvgl.widget.show: obj_timer
              - lvgl.label.update:
                  id: lbl_timer
                  text: !lambda |-
                    int remain_h = (int) id(timer).state/3600;
                    int remain_m = (int) (id(timer).state  - 3600*remain_h)/60;
                    int remain_s = (int) id(timer).state  - 3600*remain_h - 60*remain_m;
                    static char date_buf[6];
                    snprintf(date_buf, sizeof(date_buf), "%02d:%02d", remain_m, remain_s);                    
                    return date_buf;
              - lvgl.bar.update:
                  id: bar_timer
                  value: !lambda |-
                    int percentage = id(timer).state / id(timer_original_secs) * 100;
                    return percentage;
            else:
              - if:
                  condition:
                    - not: lvgl.is_paused
                  then:  
                    - lvgl.label.update:
                        id: lbl_timer
                        text: " "              
                    - lvgl.widget.hide: obj_timer 
                    - lambda: |-
                        id(timer_original_secs) = 0; 
                        ESP_LOGI("Timer", "Timer stopped");    
                  

text_sensor:            
  - platform: homeassistant
    entity_id: sensor.sun_next_rising_2
    id: sun_next_sunrise  
  - platform: homeassistant
    entity_id: sensor.sun_next_setting_2
    id: sun_next_sunset              
  - platform: homeassistant
    entity_id: media_player.kuche_3
    id: media_player      
    on_value:
      - if:
          condition:
            - lambda:  |-
                ESP_LOGI("TTS", "TTS:%s", id(tts_active).state); 
                return (strcmp(x.c_str(), "playing") == 0 && id(tts_active).state.c_str() == "idle");                          
          then:         
            - lvgl.label.update:
                id: lbl_media_player
                text:
                  format: "%s: %s"
                  args: [ 'id(media_player_artist).state.c_str()','id(media_player_title).state.c_str()' ]               
            - lvgl.widget.show: lbl_media_player
            - lvgl.widget.show: lbl_icon_music   
            - lvgl.widget.hide: lbl_calendar
            - lvgl.widget.hide: lbl_icon_calendar
          else:
            - lvgl.widget.hide: lbl_media_player
            - lvgl.widget.hide: lbl_icon_music                      
            - lvgl.widget.show: lbl_calendar     
            - lvgl.widget.show: lbl_icon_calendar 
  - platform: homeassistant
    entity_id: media_player.kuche_3
    attribute: media_title
    id: media_player_title
  - platform: homeassistant
    entity_id: media_player.kuche_3
    attribute: media_artist
    id: media_player_artist
  - platform: homeassistant
    entity_id: media_player.kuche_3
    attribute: media_album_name
    id: media_player_album    
  - platform: homeassistant
    entity_id: media_player.kuche_3
    attribute: entity_picture
    id: media_player_picture  
  - platform: homeassistant
    entity_id: sensor.dashboard_calendar_events
    attribute: next_event
    id: calender_next_event  
    on_value:
      - if:
          condition:
            - lambda:  |-
                return (x.length() > 0);                          
          then:
            - lvgl.widget.show: obj_calendar                     
            - lvgl.label.update:
                id: lbl_calendar
                text:
                  format: "%s"
                  args: [ 'x.c_str()' ]                       
          else:
            - lvgl.widget.hide: obj_calendar   
  - platform: homeassistant
    entity_id: sensor.datum
    id: date              
    on_value: 
      then:
        - lvgl.label.update:
            id: lbl_clock_longdate
            text:
              format: "%s"
              args: [ 'x.c_str()' ]         
  - platform: homeassistant
    entity_id: timer.tts_active
    id: tts_active                                      

sun:
  latitude: # add 
  longitude: # add

  on_sunrise:
    - then:
        - delay: 10s
        - script.execute: sun_update

  on_sunset:
    - then:
        - delay: 10s
        - script.execute: sun_update  

font:

      type: gfonts
      family: Roboto
      weight: 700
    id: font_clock
    size: 220
    bpp: 4
  - file:
      type: gfonts
      family: Roboto
      weight: 500
    id: font_sec
    size: 100
    bpp: 4 
  - file:
      type: gfonts
      family: Roboto
      weight: 500
    id: font_timer
    size: 80
    bpp: 4        
  - file: 'fonts/materialdesignicons-webfont.ttf' 
    id: font_mdi_large
    size: 50
    glyphs: 
      - "\U000F0B7C" # Kitchen  
      - "\U000F032A" # Leaf  
      - "\U000F059B" # sunset down
      - "\U000F059C" # sunset up
      - "\U000F00ED" # Calendar
      - "\U000F075A" # Music
